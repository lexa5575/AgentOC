name: CD

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/sha)"
        required: true
        default: "main"
      run_migrations:
        description: "Run DB migration scripts after deploy"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Over SSH
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ inputs.ref }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' RUN_MIGRATIONS='$RUN_MIGRATIONS' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          git fetch --all --tags
          git checkout "$DEPLOY_REF"

          if git show-ref --verify --quiet "refs/heads/$DEPLOY_REF"; then
            git pull --ff-only origin "$DEPLOY_REF"
          fi

          docker compose -f compose.prod.yaml build agentos-api
          docker compose -f compose.prod.yaml up -d agentos-db agentos-api

          if [ "$RUN_MIGRATIONS" = "true" ]; then
            docker exec agentos-api python scripts/migrate_thread_id.py || true
            docker exec agentos-api python scripts/migrate_conversation_states.py || true
            docker exec agentos-api python scripts/migrate_client_profile.py || true
          fi

          docker ps --format '{{.Names}}' | grep -q '^agentos-api$'
          docker ps --format '{{.Names}}' | grep -q '^agentos-db$'
          EOF
